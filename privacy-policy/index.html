<script type="text/babel">
function PrivacyPage() {
  return (
    <React.Fragment>
      <SubHeader />
      <main>
        <PageHero
          num="LEGAL"
          en="Privacy Policy"
          jp="プライバシーポリシー"
          sub="合同会社ブラネス(以下「当社」)は、お客様の個人情報を適切に保護することを社会的責務と認識し、以下の方針に基づき個人情報の取り扱いを行います。"
          breadcrumbs={[
            { label: "TOP", href: "/" },
            { label: "PRIVACY", href: "/privacy-policy/" },
          ]}
        />

        <section className="page-section">
          <div className="container">
            <div className="legal-content">

              <h3><span className="n">[01]</span>個人情報の定義</h3>
              <p>本ポリシーにおける「個人情報」とは、個人情報の保護に関する法律に定義される個人情報を指し、氏名、生年月日、住所、電話番号、メールアドレスその他の特定の個人を識別できる情報をいいます。</p>

              <h3><span className="n">[02]</span>個人情報の取得</h3>
              <p>当社は、適法かつ公正な手段によって個人情報を取得します。具体的には以下の場面で取得することがあります。</p>
              <ul>
                <li>お問い合わせフォームからのお問い合わせ時</li>
                <li>業務委託契約・業務提携に伴う連絡時</li>
                <li>メディア取材・採用応募時</li>
                <li>その他、当社のサービスご利用時</li>
              </ul>

              <h3><span className="n">[03]</span>個人情報の利用目的</h3>
              <p>取得した個人情報は、以下の目的の範囲内で利用します。</p>
              <ul>
                <li>お問い合わせへの回答・対応</li>
                <li>業務委託・業務提携にかかる連絡および契約手続き</li>
                <li>取材依頼への対応</li>
                <li>採用選考および採用に関する連絡</li>
                <li>その他、上記に付随する業務の遂行</li>
              </ul>

              <h3><span className="n">[04]</span>第三者提供</h3>
              <p>当社は、次の各号に該当する場合を除き、あらかじめお客様の同意を得ることなく、個人情報を第三者に提供することはありません。</p>
              <ol>
                <li>法令に基づく場合</li>
                <li>人の生命、身体または財産の保護のために必要がある場合であって、お客様の同意を得ることが困難であるとき</li>
                <li>公衆衛生の向上または児童の健全な育成の推進のために特に必要がある場合であって、お客様の同意を得ることが困難であるとき</li>
                <li>国の機関もしくは地方公共団体またはその委託を受けた者が法令の定める事務を遂行することに対して協力する必要がある場合</li>
              </ol>

              <h3><span className="n">[05]</span>個人情報の管理</h3>
              <p>当社は、個人情報への不正アクセス、紛失、破壊、改ざんおよび漏えいの防止のため、必要かつ適切な安全管理措置を講じます。また、業務委託先に対しても適切な監督を行います。</p>

              <h3><span className="n">[06]</span>開示・訂正・削除</h3>
              <p>お客様ご本人から、ご自身の個人情報の開示・訂正・削除・利用停止のご請求があった場合は、ご本人であることを確認したうえで、合理的な範囲で速やかに対応します。お問い合わせ窓口までご連絡ください。</p>

              <h3><span className="n">[07]</span>Cookie および解析ツールの利用</h3>
              <p>当社のWebサイトでは、サービス向上およびアクセス状況の解析のためにCookieを使用する場合があります。これにより取得される情報には、個人を特定できる情報は含まれません。ブラウザの設定によりCookieの受け入れを拒否することができます。</p>

              <h3><span className="n">[08]</span>本ポリシーの改定</h3>
              <p>当社は、法令の改正や事業内容の変更等に応じて、本ポリシーを改定することがあります。改定後の内容は、本ページに掲載した時点から効力を生じるものとします。</p>

              <h3><span className="n">[09]</span>お問い合わせ窓口</h3>
              <p>本ポリシーに関するお問い合わせは、下記までご連絡ください。</p>
              <p>
                合同会社ブラネス<br/>
                東京都新宿区<br/>
                Email: <a href="mailto:info@branesse.com" style={{color:"var(--red)", borderBottom:"1px solid currentColor"}}>info@branesse.com</a>
              </p>

              <div className="legal-meta">
                <span>制定日 2025.05.23</span>
                <span>最終改定 2026.05.18</span>
              </div>
            </div>
          </div>
        </section>

        <SubFooter />
      </main>
    </React.Fragment>
  );
}
